<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="墨记 — 技术与生活随笔。记录前端开发、后端技术、工程实践与读书思考。">
  <meta name="keywords" content="博客,技术博客,前端,JavaScript,React,CSS,Node.js,Python,Docker,Git,个人博客">
  <meta name="author" content="墨记">
  <meta property="og:title" content="墨记 — 技术与生活随笔">
  <meta property="og:description" content="用文字记录思考，用代码构建世界">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="墨记 — 技术与生活随笔">
  <meta name="robots" content="index, follow">
  <title>墨记 — 技术与生活随笔</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#818cf8">
  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" type="application/atom+xml" title="墨记 · RSS" href="feed.xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-dark">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-light" disabled>
  <!-- 预连接 CDN -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>
<body>
  <div class="aurora-bg" aria-hidden="true">
    <span class="aurora-blob aurora-1"></span>
    <span class="aurora-blob aurora-2"></span>
    <span class="aurora-blob aurora-3"></span>
  </div>
  <a href="#app" class="skip-link">跳转到主内容</a>
  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress"></div>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo">
        <span class="logo-icon">📝</span>
        <span class="logo-text">墨记</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="#/" data-route="/">首页</a></li>
        <li><a href="#/tags" data-route="/tags">标签</a></li>
        <li><a href="#/archive" data-route="/archive">归档</a></li>
        <li><a href="#/bookmarks" data-route="/bookmarks">收藏</a></li>
        <li><a href="#/about" data-route="/about">关于</a></li>
        <li><a href="#/write" data-route="/write" class="nav-write-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          写文章
        </a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换亮色/暗色主题">
        <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="main-content" id="app" role="main" aria-live="polite">
    <noscript>
      <div style="padding:40px 20px;text-align:center;font-size:1.1rem;color:#64748b;">
        此博客需要 JavaScript 支持，请启用后刷新页面。
      </div>
    </noscript>
  </main>

  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="footer-gradient-line"></div>
    <div class="footer-container">
      <div class="footer-info">
        <p>© <span id="footerYear"></span> 墨记 · Mo Notes</p>
        <p class="footer-sub">用文字记录思考，用代码构建世界</p>
      </div>
      <div class="footer-links">
        <a href="#/">首页</a>
        <a href="#/tags">标签</a>
        <a href="#/archive">归档</a>
        <a href="#/bookmarks">收藏</a>
        <a href="#/about">关于</a>
        <a href="feed.xml" title="RSS 订阅">RSS</a>
      </div>
    </div>
  </footer>

  <!-- 搜索遮罩层 -->
  <div class="search-overlay" id="searchOverlay" role="dialog" aria-label="搜索文章" aria-modal="true">
    <div class="search-modal">
      <div class="search-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="searchInput"
               placeholder="搜索文章... (按 ESC 关闭)" autofocus>
        <kbd class="search-kbd">ESC</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- 返回顶部按钮（环形进度） -->
  <button class="back-to-top" id="backToTop" aria-label="返回顶部">
    <svg class="back-to-top-ring" width="46" height="46" viewBox="0 0 46 46" aria-hidden="true">
      <circle class="btt-track" cx="23" cy="23" r="20" fill="none" stroke-width="3"/>
      <circle class="btt-progress" id="bttProgress" cx="23" cy="23" r="20" fill="none" stroke-width="3"
        stroke-dasharray="125.66" stroke-dashoffset="125.66" transform="rotate(-90 23 23)"/>
    </svg>
    <svg class="back-to-top-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <!-- 图片灯箱（画廊模式） -->
  <div class="lightbox" id="lightbox" role="dialog" aria-label="图片查看" aria-modal="true">
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="上一张">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="下一张">›</button>
    <div class="lightbox-content">
      <img id="lightboxImg" src="" alt="" draggable="false">
      <div class="lightbox-controls" id="lightboxControls">
        <button class="lightbox-zoom-btn" id="lightboxZoomIn" aria-label="放大">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="lightbox-zoom-btn" id="lightboxZoomOut" aria-label="缩小">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="lightbox-zoom-btn" id="lightboxZoomReset" aria-label="重置缩放">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <span class="lightbox-zoom-level" id="lightboxZoomLevel">100%</span>
      </div>
      <button class="lightbox-close" id="lightboxClose" aria-label="关闭">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <span class="lightbox-counter" id="lightboxCounter"></span>
  </div>

  <!-- 移动端目录抽屉 -->
  <button class="toc-fab" id="tocFab" aria-label="打开文章目录" aria-expanded="false">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/>
      <line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/>
      <line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    <span>目录</span>
  </button>
  <div class="toc-drawer-overlay" id="tocDrawerOverlay"></div>
  <aside class="toc-drawer" id="tocDrawer" role="dialog" aria-label="文章目录" aria-modal="true">
    <div class="toc-drawer-header">
      <span class="toc-drawer-title">目录</span>
      <button class="toc-drawer-close" id="tocDrawerClose" aria-label="关闭目录">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="toc-drawer-body" id="tocDrawerBody"></div>
  </aside>

  <!-- 第三方库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <!-- 博客数据和应用逻辑 -->
  <script src="js/posts.js"></script>
  <script src="js/app.js"></script>
  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
